<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artemis II Tracker</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #081120 0%, #030712 100%);
      color: #f3f4f6;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }
    .subtitle {
      margin: 0 0 24px;
      color: #9ca3af;
    }
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button:hover { background: #1d4ed8; }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }
    .label {
      font-size: 0.9rem;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    .value {
      font-size: 1.7rem;
      font-weight: bold;
    }
    .canvas-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
    }
    canvas {
      width: 100%;
      max-width: 100%;
      background: radial-gradient(circle at top, #0f1f3a, #050814 70%);
      border-radius: 14px;
      display: block;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .status {
      margin-top: 14px;
      color: #93c5fd;
      font-size: 0.95rem;
    }
    footer {
      text-align: center;
      margin-top: 30px;
      color: #9ca3af;
      font-size: 0.9rem;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 1.6rem; }
      .value { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Artemis II Tracker</h1>
    <p class="subtitle">Public live demo showing simulated real-time spacecraft movement from Earth toward the Moon.</p>

    <div class="controls">
      <button id="sampleBtn">Load Current Frame</button>
      <button id="playBtn">Start / Pause Live Demo</button>
    </div>

    <div class="grid">
      <div class="card">
        <div class="label">Speed</div>
        <div class="value" id="speedValue">0 km/s</div>
      </div>
      <div class="card">
        <div class="label">Distance from Earth</div>
        <div class="value" id="earthDistance">0 km</div>
      </div>
      <div class="card">
        <div class="label">Distance from Moon</div>
        <div class="value" id="moonDistance">0 km</div>
      </div>
      <div class="card">
        <div class="label">Mission Time</div>
        <div class="value" id="missionTime">0h 0m</div>
      </div>
    </div>

    <div class="canvas-card">
      <canvas id="spaceCanvas" width="1100" height="620"></canvas>
      <div class="status" id="statusText">Status: loading live demo view.</div>
    </div>

    <footer>Built by Abhi | Artemis II public demo</footer>
  </div>

  <script>
    const canvas = document.getElementById('spaceCanvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('statusText');
    let animationTimer = null;

    function formatMissionTime(seconds) {
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      return `${hours}h ${minutes}m`;
    }

    function buildLiveFrame() {
      const now = Date.now() / 1000;

      const earth = { x: 0.18, y: 0.62 };
      const moon = { x: 0.78, y: 0.36 };

      const orbitProgress = (now / 12) % 1;
      const startX = earth.x;
      const startY = earth.y;
      const endX = moon.x;
      const endY = moon.y;

      const currentX = startX + (endX - startX) * orbitProgress;
      const currentY = startY + (endY - startY) * orbitProgress - Math.sin(orbitProgress * Math.PI) * 0.12;

      const trajectory = [];
      const points = 50;

      for (let i = 0; i <= points; i++) {
        const t = (orbitProgress * i) / points;
        const x = startX + (endX - startX) * t;
        const y = startY + (endY - startY) * t - Math.sin(t * Math.PI) * 0.12;
        trajectory.push({ x, y });
      }

      return {
        timestamp: new Date().toISOString(),
        mission_elapsed_seconds: Math.floor((now * 8) % 864000),
        speed_km_s: 7.8 + Math.sin(now / 8) * 0.18,
        distance_earth_km: Math.floor(18000 + orbitProgress * 366000),
        distance_moon_km: Math.floor(384000 - orbitProgress * 366000),
        position: { x: currentX, y: currentY },
        earth,
        moon,
        trajectory
      };
    }

    function drawCircle(x, y, radius, label, fill) {
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = fill;
      ctx.fill();

      ctx.fillStyle = '#ffffff';
      ctx.font = '16px Arial';
      ctx.fillText(label, x + radius + 8, y + 4);
    }

    function drawScene(frame) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const earthX = frame.earth.x * canvas.width;
      const earthY = frame.earth.y * canvas.height;
      const moonX = frame.moon.x * canvas.width;
      const moonY = frame.moon.y * canvas.height;

      for (let i = 0; i < 80; i++) {
        const starX = (i * 137) % canvas.width;
        const starY = (i * 83) % canvas.height;
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.fillRect(starX, starY, 2, 2);
      }

      if (frame.trajectory.length > 1) {
        ctx.beginPath();
        frame.trajectory.forEach((point, index) => {
          const x = point.x * canvas.width;
          const y = point.y * canvas.height;
          if (index === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.strokeStyle = '#60a5fa';
        ctx.lineWidth = 3;
        ctx.stroke();
      }

      drawCircle(earthX, earthY, 28, 'Earth', '#2563eb');
      drawCircle(moonX, moonY, 20, 'Moon', '#d1d5db');

      const shipX = frame.position.x * canvas.width;
      const shipY = frame.position.y * canvas.height;
      drawCircle(shipX, shipY, 10, 'Artemis II', '#f97316');
    }

    function applyFrame(frame, message) {
      document.getElementById('speedValue').textContent = `${frame.speed_km_s.toFixed(2)} km/s`;
      document.getElementById('earthDistance').textContent = `${frame.distance_earth_km.toLocaleString()} km`;
      document.getElementById('moonDistance').textContent = `${frame.distance_moon_km.toLocaleString()} km`;
      document.getElementById('missionTime').textContent = formatMissionTime(frame.mission_elapsed_seconds);
      drawScene(frame);
      statusEl.textContent = `Status: ${message}`;
    }

    document.getElementById('sampleBtn').addEventListener('click', () => {
      const liveFrame = buildLiveFrame();
      applyFrame(liveFrame, 'loaded current live demo frame.');
    });

    document.getElementById('playBtn').addEventListener('click', () => {
      if (animationTimer) {
        clearInterval(animationTimer);
        animationTimer = null;
        statusEl.textContent = 'Status: live demo paused.';
        return;
      }

      applyFrame(buildLiveFrame(), 'running live demo.');
      animationTimer = setInterval(() => {
        applyFrame(buildLiveFrame(), 'running live demo.');
      }, 2000);
    });

    applyFrame(buildLiveFrame(), 'loaded default live demo view.');
  </script>
</body>
</html>
