<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artemis II Tracker</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #081120 0%, #030712 100%);
      color: #f3f4f6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .subtitle {
      margin: 0 0 24px;
      color: #9ca3af;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover { background: #1d4ed8; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 18px;
    }

    .label {
      color: #9ca3af;
      margin-bottom: 8px;
    }

    .value {
      font-size: 1.6rem;
      font-weight: bold;
    }

    canvas {
      width: 100%;
      border-radius: 14px;
      background: radial-gradient(circle at top, #0f1f3a, #050814 70%);
    }

    .status {
      margin-top: 10px;
      color: #93c5fd;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      color: #9ca3af;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🚀 Artemis II Tracker</h1>
  <p class="subtitle">Live demo powered by NASA-style telemetry data</p>

  <div class="controls">
    <button id="sampleBtn">Load NASA Data</button>
    <button id="playBtn">Start / Pause Auto Refresh</button>
  </div>

  <div class="grid">
    <div class="card">
      <div class="label">Speed</div>
      <div class="value" id="speedValue">--</div>
    </div>

    <div class="card">
      <div class="label">Distance from Earth</div>
      <div class="value" id="earthDistance">--</div>
    </div>

    <div class="card">
      <div class="label">Distance from Moon</div>
      <div class="value" id="moonDistance">--</div>
    </div>

    <div class="card">
      <div class="label">Mission Time</div>
      <div class="value" id="missionTime">--</div>
    </div>
  </div>

  <canvas id="spaceCanvas" width="1100" height="600"></canvas>
  <div class="status" id="statusText">Status: Loading...</div>

  <footer>Built by Abhi | Artemis II Tracker</footer>
</div>

<script>
const canvas = document.getElementById('spaceCanvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('statusText');

let timer = null;

function formatTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return `${h}h ${m}m`;
}

async function fetchData() {
  const res = await fetch('./artemis2.json', { cache: 'no-store' });
  if (!res.ok) throw new Error('Missing artemis2.json');
  return res.json();
}

function drawCircle(x, y, r, color, label) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  ctx.fillStyle = "white";
  ctx.fillText(label, x + r + 5, y);
}

function draw(frame) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // stars
  for (let i = 0; i < 80; i++) {
    ctx.fillRect((i * 37) % canvas.width, (i * 53) % canvas.height, 2, 2);
  }

  // trajectory
  if (frame.trajectory) {
    ctx.beginPath();
    frame.trajectory.forEach((p, i) => {
      const x = p.x * canvas.width;
      const y = p.y * canvas.height;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.strokeStyle = "#60a5fa";
    ctx.stroke();
  }

  drawCircle(frame.earth.x * canvas.width, frame.earth.y * canvas.height, 25, "#2563eb", "Earth");
  drawCircle(frame.moon.x * canvas.width, frame.moon.y * canvas.height, 18, "#ccc", "Moon");
  drawCircle(frame.position.x * canvas.width, frame.position.y * canvas.height, 8, "#f97316", "Orion");
}

function updateUI(frame) {
  document.getElementById('speedValue').innerText = frame.speed_km_s + " km/s";
  document.getElementById('earthDistance').innerText = frame.distance_earth_km.toLocaleString() + " km";
  document.getElementById('moonDistance').innerText = frame.distance_moon_km.toLocaleString() + " km";
  document.getElementById('missionTime').innerText = formatTime(frame.mission_elapsed_seconds);

  draw(frame);
}

async function load() {
  try {
    const data = await fetchData();
    updateUI(data);
    statusEl.innerText = "Status: Loaded NASA data";
  } catch (e) {
    statusEl.innerText = "Error: " + e.message;
  }
}

document.getElementById('sampleBtn').onclick = load;

document.getElementById('playBtn').onclick = () => {
  if (timer) {
    clearInterval(timer);
    timer = null;
    statusEl.innerText = "Paused";
    return;
  }

  load();
  timer = setInterval(load, 30000);
};

load();
</script>

</body>
</html>
